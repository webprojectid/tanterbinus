<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Tanda Terima · Binus Alsut</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@8.2.3/build/index.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

    <!-- VANTA.JS GLOBE DEPENDENCIES -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.globe.min.js"></script>

    <style>
        /* ================================================================
           ROOT VARIABLES
           ================================================================ */
        :root {
            --glass-bg: rgba(240, 240, 245, 0.75);
            --glass-border: rgba(0, 0, 0, 0.08);
            --glass-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            --glass-blur: 20px;
            --label: #1c1c1e;
            --label2: rgba(60, 60, 67, 0.7);
            --label3: rgba(60, 60, 67, 0.40);
            --tint: #007AFF;
            --green: #34C759;
            --red: #FF3B30;
            --orange: #FF9500;
            --separator: rgba(60, 60, 67, 0.18);
            --nav-bg: rgba(255, 255, 255, 0.50);
            --nav-blur: blur(32px) saturate(180%);
            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 18px;
            --radius-xl: 14px;
            --bg-calendar: rgba(255, 255, 255, 0.92);
            --text-calendar: #1c1c1e;
            --cell-hover: rgba(0, 122, 255, 0.12);
            --cell-selected: #007AFF;
            --cell-selected-text: #fff;
        }

        [data-theme="dark"] {
            --glass-bg: rgba(36, 36, 36, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            --label: #f5f5f7;
            --label2: rgba(235, 235, 245, 0.55);
            --label3: rgba(235, 235, 245, 0.30);
            --tint: #0A84FF;
            --green: #30D158;
            --red: #FF453A;
            --orange: #FF9F0A;
            --separator: rgba(84, 84, 88, 0.40);
            --nav-bg: rgba(28, 28, 30, 0.55);
            --bg-calendar: rgba(30, 30, 34, 0.95);
            --text-calendar: #f5f5f7;
            --cell-hover: rgba(10, 132, 255, 0.20);
            --cell-selected: #0A84FF;
            --cell-selected-text: #fff;
        }

        /* ================================================================
           RESET & BASE
           ================================================================ */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        html, body {
            min-height: 100vh;
            min-height: 100dvh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* -------- VANTA.JS BACKGROUND -------- */
        #vanta-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            background: #0b0b12; 
        }

        /* -------- BODY -------- */
        body {
            position: relative;
            z-index: 2;
            color: var(--label);
            min-height: 100vh;
            min-height: 100dvh;
            transition: color 0.3s ease;
        }

        /* ================================================================
           GLASSMORPHISM COMPONENTS
           ================================================================ */
        .glass, .ios-group, .item-card {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: var(--radius-xl);
            overflow: hidden;
            margin-bottom: 12px;
            transition: transform 0.3s ease, background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .item-card:hover {
            transform: translateY(-2px);
        }

        .nav-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--nav-bg);
            backdrop-filter: var(--nav-blur);
            -webkit-backdrop-filter: var(--nav-blur);
            border-bottom: 1px solid var(--glass-border);
            padding: env(safe-area-inset-top, 0) 0 0;
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        #scanner-container {
            border-radius: var(--radius-xl);
            overflow: hidden;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            margin-bottom: 10px;
        }

        .sig-pad-wrapper {
            position: relative;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px dashed var(--separator);
            overflow: hidden;
            touch-action: none;
            cursor: crosshair;
            height: 100px;
            width: 100%;
            transition: border-color 0.2s, background 0.2s;
        }

        [data-theme="dark"] .sig-pad-wrapper {
            background: rgba(255, 255, 255, 0.04);
        }

        .sig-pad-wrapper:focus-within,
        .sig-pad-wrapper.signed {
            border-style: solid;
            border-color: var(--green);
            background: rgba(52, 199, 89, 0.08);
        }

        [data-theme="dark"] .sig-pad-wrapper:focus-within,
        [data-theme="dark"] .sig-pad-wrapper.signed {
            background: rgba(48, 209, 88, 0.10);
        }

        /* ================================================================
           CUSTOM DATE PICKER STYLES
           ================================================================ */
        .custom-date-wrap {
            flex: 1;
            display: flex;
            justify-content: flex-end;
        }
        
        .custom-date-trigger {
            background: transparent;
            border: none;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 400;
            color: var(--label);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background 0.2s;
            outline: none;
        }
        
        .custom-date-trigger:hover {
            background: rgba(128, 128, 128, 0.1);
        }
        
        .date-text {
            color: var(--label);
        }
        
        .date-text.placeholder {
            color: var(--label3);
        }
        
        .date-arrow {
            color: var(--label2);
            font-size: 12px;
            transition: transform 0.2s ease;
        }
        
        .date-arrow.open {
            transform: rotate(180deg);
        }
        
        .calendar-popup {
            position: fixed;
            z-index: 1000;
            background: var(--bg-calendar);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            box-shadow: 0 12px 40px rgba(0,0,0,0.2);
            width: 320px;
            padding: 16px;
            display: none;
        }
        
        .calendar-popup.visible {
            display: block;
        }
        
        .cal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        
        .cal-month-year {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-calendar);
        }
        
        .cal-nav {
            display: flex;
            gap: 8px;
        }
        
        .cal-nav button {
            background: rgba(128, 128, 128, 0.1);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            color: var(--text-calendar);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        
        .cal-nav button:hover {
            background: rgba(128, 128, 128, 0.2);
        }
        
        .cal-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-bottom: 8px;
        }
        
        .cal-weekdays span {
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            color: var(--label2);
            padding: 4px 0;
        }
        
        .cal-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-bottom: 16px;
        }
        
        .cal-day {
            aspect-ratio: 1;
            border: none;
            background: transparent;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            color: var(--text-calendar);
            transition: all 0.15s;
            font-family: inherit;
        }
        
        .cal-day:hover:not(.empty) {
            background: var(--cell-hover);
        }
        
        .cal-day.today {
            color: var(--tint);
            font-weight: 600;
        }
        
        .cal-day.selected {
            background: var(--cell-selected);
            color: var(--cell-selected-text);
        }
        
        .cal-day.other-month {
            color: var(--label3);
        }
        
        .cal-day.empty {
            pointer-events: none;
            opacity: 0.3;
        }
        
        .cal-footer {
            display: flex;
            gap: 8px;
        }
        
        .cal-footer button {
            flex: 1;
            padding: 8px;
            border: 1px solid var(--separator);
            background: transparent;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-calendar);
            font-family: inherit;
            transition: background 0.2s;
        }
        
        .cal-footer button:hover {
            background: rgba(128, 128, 128, 0.1);
        }
        
        /* CUSTOM SELECT STYLES */
        .custom-select-wrap {
            position: relative;
            flex: 1;
            display: flex;
            justify-content: flex-end;
        }
        
        .custom-select-trigger {
            background: transparent;
            border: none;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 400;
            color: var(--label);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background 0.2s;
            outline: none;
        }
        
        .custom-select-trigger:hover {
            background: rgba(128, 128, 128, 0.1);
        }
        
        .sel-text {
            color: var(--label);
        }
        
        .sel-arrow {
            color: var(--label2);
            font-size: 12px;
            transition: transform 0.2s ease;
        }
        
        .sel-arrow.open {
            transform: rotate(180deg);
        }
        
        .select-dropdown {
            position: fixed;
            z-index: 1000;
            background: var(--bg-calendar);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.2);
            display: none;
            overflow: hidden;
            max-height: 280px;
            overflow-y: auto;
        }
        
        .select-dropdown.visible {
            display: block;
        }
        
        .sel-option {
            width: 100%;
            padding: 12px 16px;
            border: none;
            background: transparent;
            text-align: left;
            font-size: 15px;
            cursor: pointer;
            color: var(--text-calendar);
            font-family: inherit;
            transition: background 0.15s;
        }
        
        .sel-option:hover {
            background: var(--cell-hover);
        }
        
        .sel-option.selected {
            color: var(--tint);
            font-weight: 600;
        }

        /* ================================================================
           UIVERSE RESET BUTTON
           ================================================================ */
        .btn-uiverse-reset {
          --primary: 255, 90, 120;
          --secondary: 150, 50, 60;
          width: 60px;
          height: 50px;
          border: none;
          outline: none;
          cursor: pointer;
          user-select: none;
          touch-action: manipulation;
          outline: 10px solid rgb(var(--primary), .5);
          border-radius: 100%;
          position: relative;
          transition: .3s;
          background: transparent;
        }
        .btn-uiverse-reset .back { background: rgb(var(--secondary)); border-radius: 100%; position: absolute; left: 0; top: 0; width: 100%; height: 100%; }
        .btn-uiverse-reset .front { background: linear-gradient(0deg, rgba(var(--primary), .6) 20%, rgba(var(--primary)) 50%); box-shadow: 0 .5em 1em -0.2em rgba(var(--secondary), .5); border-radius: 100%; position: absolute; border: 1px solid rgb(var(--secondary)); left: 0; top: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; font-size: 1.8rem; font-weight: 600; font-family: inherit; transform: translateY(-15%); transition: .15s; color: rgb(var(--secondary)); }
        .btn-uiverse-reset:active .front { transform: translateY(0%); box-shadow: 0 0; }

        /* ================================================================
           UIVERSE DELETE BUTTON
           ================================================================ */
        .btn-delete-uiverse { width: 90px; height: 32px; cursor: pointer; display: flex; align-items: center; background: red; border: none; border-radius: 5px; box-shadow: 1px 1px 3px rgba(0,0,0,0.15); background: #e62222; position: relative; overflow: hidden; }
        .btn-delete-uiverse, .btn-delete-uiverse span { transition: 200ms; }
        .btn-delete-uiverse .text { transform: translateX(12px); color: white; font-weight: bold; font-size: 12px; }
        .btn-delete-uiverse .icon { position: absolute; border-left: 1px solid #c41b1b; transform: translateX(64px); height: 26px; width: 26px; display: flex; align-items: center; justify-content: center; }
        .btn-delete-uiverse svg { width: 12px; fill: #eee; }
        .btn-delete-uiverse:hover { background: #ff3636; }
        .btn-delete-uiverse:hover .text { color: transparent; }
        .btn-delete-uiverse:hover .icon { width: 90px; border-left: none; transform: translateX(0); }
        .btn-delete-uiverse:active .icon svg { transform: scale(0.8); }

        /* ================================================================
           UIVERSE LENFEAR METALLIC BUTTON 
           ================================================================ */
        .btn-lenfear {
          display: flex;
          align-items: center;
          justify-content: center;
          outline: none;
          cursor: pointer;
          background-image: linear-gradient(to top, #D8D9DB 0%, #fff 80%, #FDFDFD 100%);
          border-radius: 30px;
          border: 1px solid #8F9092;
          transition: all 0.2s ease;
          font-family: inherit;
          font-weight: 600;
          color: #606060;
          text-shadow: 0 1px #fff;
          padding: 0;
        }

        .btn-lenfear:not(:disabled):hover { box-shadow: 0 4px 3px 1px #FCFCFC, 0 6px 8px #D6D7D9, 0 -4px 4px #CECFD1, 0 -6px 4px #FEFEFE, inset 0 0 3px 3px #CECFD1; }
        .btn-lenfear:not(:disabled):active, .btn-lenfear:not(:disabled):focus { box-shadow: 0 4px 3px 1px #FCFCFC, 0 6px 8px #D6D7D9, 0 -4px 4px #CECFD1, 0 -6px 4px #FEFEFE, inset 0 0 5px 3px #999, inset 0 0 30px #aaa; }
        .btn-lenfear:disabled { opacity: 0.5; pointer-events: none; }

        .btn-lenfear-sm { height: 36px; padding: 0 16px; font-size: 13px; min-width: 80px; }
        .btn-lenfear-lg { width: 100%; height: 50px; font-size: 15px; }

        /* ================================================================
           UIVERSE GENERATE BUTTON (FColombati)
           ================================================================ */
        .gen-btn-wrap {
          --global--size: 1.1rem;
          --anim--hover-time: 400ms;
          --anim--hover-ease: cubic-bezier(0.25, 1, 0.5, 1);
          position: relative;
          z-index: 2;
          border-radius: 999px;
          background: transparent;
          transition: all var(--anim--hover-time) var(--anim--hover-ease);
          width: 100%;
          height: 54px; 
        }

        .gen-btn-shadow {
          --shadow-cuttoff-fix: 2em;
          position: absolute;
          width: calc(100% + var(--shadow-cuttoff-fix));
          height: calc(100% + var(--shadow-cuttoff-fix));
          top: calc(0% - var(--shadow-cuttoff-fix) / 2);
          left: calc(0% - var(--shadow-cuttoff-fix) / 2);
          filter: blur(clamp(2px, 0.125em, 12px));
          overflow: visible;
          pointer-events: none;
        }

        .gen-btn-shadow::after { content: ""; position: absolute; z-index: 0; inset: 0; border-radius: 999px; background: linear-gradient(180deg, rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.1)); width: calc(100% - var(--shadow-cuttoff-fix) - 0.25em); height: calc(100% - var(--shadow-cuttoff-fix) - 0.25em); top: calc(var(--shadow-cuttoff-fix) - 0.5em); left: calc(var(--shadow-cuttoff-fix) - 0.875em); padding: 0.125em; box-sizing: border-box; mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); mask-composite: exclude; transition: all var(--anim--hover-time) var(--anim--hover-ease); opacity: 1; }
        .gen-btn-uiverse { --border-width: clamp(1px, 0.0625em, 4px); all: unset; cursor: pointer; position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; pointer-events: auto; z-index: 3; background: linear-gradient(-75deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.05)); border-radius: 999px; box-shadow: inset 0 0.125em 0.125em rgba(0, 0, 0, 0.05), inset 0 -0.125em 0.125em rgba(255, 255, 255, 0.5), 0 0.25em 0.125em -0.125em rgba(0, 0, 0, 0.2), 0 0 0.1em 0.25em inset rgba(255, 255, 255, 0.2), 0 0 0 0 rgba(255, 255, 255, 1); backdrop-filter: blur(clamp(1px, 0.125em, 4px)); transition: all var(--anim--hover-time) var(--anim--hover-ease); color: var(--label); }
        .gen-btn-uiverse:hover { transform: scale(0.975); backdrop-filter: blur(0.01em); box-shadow: inset 0 0.125em 0.125em rgba(0, 0, 0, 0.05), inset 0 -0.125em 0.125em rgba(255, 255, 255, 0.5), 0 0.15em 0.05em -0.1em rgba(0, 0, 0, 0.25), 0 0 0.05em 0.1em inset rgba(255, 255, 255, 0.5), 0 0 0 0 rgba(255, 255, 255, 1); }
        .gen-btn-span { position: relative; display: block; user-select: none; font-family: "Inter", sans-serif; letter-spacing: -0.05em; font-weight: 600; font-size: var(--global--size); text-shadow: 0em 0.25em 0.05em rgba(0, 0, 0, 0.1); transition: all var(--anim--hover-time) var(--anim--hover-ease); }
        [data-theme="dark"] .gen-btn-uiverse { color: #fff; }
        .gen-btn-uiverse:hover .gen-btn-span { text-shadow: 0.025em 0.025em 0.025em rgba(0, 0, 0, 0.12); }
        .gen-btn-span::after { content: ""; display: block; position: absolute; z-index: 1; width: calc(100% - var(--border-width)); height: calc(100% - var(--border-width)); top: calc(0% + var(--border-width) / 2); left: calc(0% + var(--border-width) / 2); box-sizing: border-box; border-radius: 999px; overflow: clip; background: linear-gradient(var(--angle-2), rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.5) 40% 50%, rgba(255, 255, 255, 0) 55%); z-index: 3; mix-blend-mode: screen; pointer-events: none; background-size: 200% 200%; background-position: 0% 50%; background-repeat: no-repeat; transition: background-position calc(var(--anim--hover-time) * 1.25) var(--anim--hover-ease), --angle-2 calc(var(--anim--hover-time) * 1.25) var(--anim--hover-ease); }
        .gen-btn-uiverse:hover .gen-btn-span::after { background-position: 25% 50%; }
        .gen-btn-uiverse:active .gen-btn-span::after { background-position: 50% 15%; --angle-2: -15deg; }
        .gen-btn-uiverse::after { content: ""; position: absolute; z-index: 1; inset: 0; border-radius: 999px; width: calc(100% + var(--border-width)); height: calc(100% + var(--border-width)); top: calc(0% - var(--border-width) / 2); left: calc(0% - var(--border-width) / 2); padding: var(--border-width); box-sizing: border-box; background: conic-gradient(from var(--angle-1) at 50% 50%, rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0) 5% 40%, rgba(0, 0, 0, 0.5) 50%, rgba(0, 0, 0, 0) 60% 95%, rgba(0, 0, 0, 0.5)), linear-gradient(180deg, rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0.5)); mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); mask-composite: exclude; transition: all var(--anim--hover-time) var(--anim--hover-ease), --angle-1 500ms ease; box-shadow: inset 0 0 0 calc(var(--border-width) / 2) rgba(255, 255, 255, 0.5); }
        .gen-btn-uiverse:hover::after { --angle-1: -125deg; }
        .gen-btn-uiverse:active::after { --angle-1: -75deg; }
        .gen-btn-wrap:has(button:hover) .gen-btn-shadow { filter: blur(clamp(2px, 0.0625em, 6px)); transition: filter var(--anim--hover-time) var(--anim--hover-ease); }
        .gen-btn-wrap:has(button:hover) .gen-btn-shadow::after { top: calc(var(--shadow-cuttoff-fix) - 0.875em); opacity: 1; }
        .gen-btn-wrap:has(button:active) { transform: rotate3d(1, 0, 0, 25deg); }
        .gen-btn-wrap:has(button:active) button { box-shadow: inset 0 0.125em 0.125em rgba(0, 0, 0, 0.05), inset 0 -0.125em 0.125em rgba(255, 255, 255, 0.5), 0 0.125em 0.125em -0.125em rgba(0, 0, 0, 0.2), 0 0 0.1em 0.25em inset rgba(255, 255, 255, 0.2), 0 0.225em 0.05em 0 rgba(0, 0, 0, 0.05), 0 0.25em 0 0 rgba(255, 255, 255, 0.75), inset 0 0.25em 0.05em 0 rgba(0, 0, 0, 0.15); }
        .gen-btn-wrap:has(button:active) .gen-btn-shadow { filter: blur(clamp(2px, 0.125em, 12px)); }
        .gen-btn-wrap:has(button:active) .gen-btn-shadow::after { top: calc(var(--shadow-cuttoff-fix) - 0.5em); opacity: 0.75; }
        .gen-btn-wrap:has(button:active) span { text-shadow: 0.025em 0.25em 0.05em rgba(0, 0, 0, 0.12); }


        /* ================================================================
           OTHER BASE BUTTONS & UI
           ================================================================ */
        .btn-section { margin-top: 16px; display: flex; flex-direction: column; gap: 10px; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* RECEIPT PREVIEW (PRINT) */
        #receipt-wrapper { position: fixed; top: -9999px; left: -9999px; opacity: 0; pointer-events: none; width: 800px; }
        #receipt-preview { background: #FFFFFF; color: #000000; padding: 40px; font-family: Arial, Helvetica, sans-serif; max-width: 800px; min-height: 1131px; margin: 0 auto; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); font-size: 13px; width: 100%; }
        #receipt-preview .receipt-title { text-align: center; font-size: 16px; font-weight: bold; text-decoration: underline; text-transform: uppercase; color: #000000; margin-bottom: 30px; }

        #receipt-preview table.sig-table th { font-weight: normal; padding: 5px; text-align: center; }

        #receipt-preview .sig-row .s-colon { width: 15px; }
        #receipt-preview .sig-image { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); max-height: 130px; width: auto; max-width: 90%; object-fit: contain; }

        @media print {
            body * { visibility: hidden; }

        /* item grid */
        .item-fields-grid { display: grid; grid-template-columns: 1fr 1fr; }

        .item-field-cell:not(.no-border-right):nth-child(odd)::after { content: ''; position: absolute; top: 0; bottom: 0; right: 0; width: 1px; background: var(--separator); }

        .scroll-area { position: relative; z-index: 2; max-width: 430px; margin: 0 auto; padding: 16px 16px env(safe-area-inset-bottom, 32px); padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 100px); }

    <!-- ============================================================ -->
    <!-- JAVASCRIPT                                                   -->
    <!-- ============================================================ -->
    <script>
        // ================================================================
        // VANTA.JS GLOBE INITIATOR
        // ================================================================
        let vantaEffect = null;

        function updateVantaTheme(theme) {
            if (vantaEffect) vantaEffect.destroy();
            const isDark = theme === 'dark';
            
            vantaEffect = VANTA.GLOBE({
                el: "#vanta-bg",
                mouseControls: true,
                touchControls: true,
                gyroControls: false,
                minHeight: 200.00,
                minWidth: 200.00,
                scale: 1.00,
                scaleMobile: 1.00,
                size: 0.50,
                color: isDark ? 0x0a84ff : 0x007aff,
                color2: isDark ? 0xffffff : 0x1c1c1e,
                backgroundColor: isDark ? 0x0b0b12 : 0xe8ecf4
            });
        }

        // ================================================================
        // THEME
        // ================================================================
        let currentLang = 'id';

        function updateThemeUI() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const themeSwitch = document.getElementById('switch');
            if (themeSwitch) themeSwitch.checked = isDark;
            updateVantaTheme(isDark ? 'dark' : 'light');
        }

        function toggleTheme() {
            const html = document.documentElement;
            const newTheme = (html.getAttribute('data-theme') || 'dark') === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            html.style.colorScheme = newTheme;
            localStorage.setItem('binus_theme', newTheme);
            updateThemeUI();
        }

        // ================================================================
        // CUSTOM DATE PICKER – iOS Glass Style (FIXED)
        // ================================================================
        let datePickerInstance = null;

        function createDatePicker() {
            const trigger = document.getElementById('date-trigger');
            const display = document.getElementById('date-display');
            const hidden = document.getElementById('receipt-date');
            const arrow = document.getElementById('date-arrow');

            const popup = document.createElement('div');
            popup.className = 'calendar-popup';
            popup.id = 'calendar-popup';
            document.body.appendChild(popup);

            let selectedDate = null;
            let currentMonth = new Date().getMonth();
            let currentYear = new Date().getFullYear();
            let isOpen = false;

            function formatDateDisplay(date) {
                if (!date) return 'Pilih Tanggal';
                const d = new Date(date);
                return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });
            }

            function formatDateValue(date) {
                if (!date) return '';
                const d = new Date(date);
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return y + '-' + m + '-' + day;
            }

            function updateDisplay() {
                if (selectedDate) {
                    display.textContent = formatDateDisplay(selectedDate);
                    display.className = 'date-text';
                    hidden.value = formatDateValue(selectedDate);
                } else {
                    display.textContent = 'Pilih Tanggal';
                    display.className = 'date-text placeholder';
                    hidden.value = '';
                }
                hidden.dispatchEvent(new Event('change', { bubbles: true }));
            }

            function renderCalendar() {
                const firstDay = new Date(currentYear, currentMonth, 1).getDay();
                const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
                const daysInPrev = new Date(currentYear, currentMonth, 0).getDate();

                const monthNames = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni',
                    'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'
                ];
                const weekDays = ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'];

                let html = `
                        <div class="cal-header">
                            <span class="cal-month-year">${monthNames[currentMonth]} ${currentYear}</span>
                            <div class="cal-nav">
                                <button type="button" data-prev>‹</button>
                                <button type="button" data-next>›</button>
                            </div>
                        </div>
                        <div class="cal-weekdays">${weekDays.map(d => `<span>${d}</span>`).join('')}</div>
                        <div class="cal-days">
                    `;

                for (let i = 0; i < firstDay; i++) {
                    const prevDay = daysInPrev - firstDay + i + 1;
                    html += `<button type="button" class="cal-day empty other-month" data-day="${prevDay}" data-month="${currentMonth - 1 < 0 ? 11 : currentMonth - 1}" data-year="${currentMonth - 1 < 0 ? currentYear - 1 : currentYear}">${prevDay}</button>`;
                }

                const today = new Date();
                const todayStr = formatDateValue(today);
                const selectedStr = selectedDate ? formatDateValue(selectedDate) : null;

                for (let d = 1; d <= daysInMonth; d++) {
                    const dateObj = new Date(currentYear, currentMonth, d);
                    const dateStr = formatDateValue(dateObj);
                    let cls = 'cal-day';
                    if (dateStr === todayStr) cls += ' today';
                    if (dateStr === selectedStr) cls += ' selected';
                    html += `<button type="button" class="${cls}" data-day="${d}" data-month="${currentMonth}" data-year="${currentYear}">${d}</button>`;
                }

                const totalCells = firstDay + daysInMonth;
                const remaining = (7 - (totalCells % 7)) % 7;
                for (let i = 1; i <= remaining; i++) {
                    html += `<button type="button" class="cal-day empty other-month" data-day="${i}" data-month="${currentMonth + 1 > 11 ? 0 : currentMonth + 1}" data-year="${currentMonth + 1 > 11 ? currentYear + 1 : currentYear}">${i}</button>`;
                }

                html += `
                        </div>
                        <div class="cal-footer">
                            <button type="button" class="cal-clear" data-clear>Clear</button>
                            <button type="button" data-today>Today</button>
                        </div>
                    `;

                popup.innerHTML = html;

                popup.querySelectorAll('.cal-day:not(.empty)').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const day = parseInt(this.dataset.day);
                        const month = parseInt(this.dataset.month);
                        const year = parseInt(this.dataset.year);
                        selectedDate = new Date(year, month, day);
                        updateDisplay();
                        closeCalendar();
                    });
                });

                popup.querySelector('[data-prev]').addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (currentMonth === 0) { currentMonth = 11;
                        currentYear--; } else { currentMonth--; }
                    renderCalendar();
                });

                popup.querySelector('[data-next]').addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (currentMonth === 11) { currentMonth = 0;
                        currentYear++; } else { currentMonth++; }
                    renderCalendar();
                });

                popup.querySelector('[data-today]').addEventListener('click', function(e) {
                    e.stopPropagation();
                    const today = new Date();
                    selectedDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
                    currentMonth = today.getMonth();
                    currentYear = today.getFullYear();
                    updateDisplay();
                    renderCalendar();
                    closeCalendar();
                });

                popup.querySelector('[data-clear]').addEventListener('click', function(e) {
                    e.stopPropagation();
                    selectedDate = null;
                    updateDisplay();
                    renderCalendar();
                    closeCalendar();
                });
            }

            function positionPopup() {
                const rect = trigger.getBoundingClientRect();
                const popupRect = popup.getBoundingClientRect();
                const vw = window.innerWidth;
                const vh = window.innerHeight;

                let top = rect.bottom + 8;
                let left = rect.left + rect.width / 2 - popupRect.width / 2;

                if (left < 16) left = 16;
                if (left + popupRect.width > vw - 16) left = vw - popupRect.width - 16;
                if (top + popupRect.height > vh - 16) {
                    top = rect.top - popupRect.height - 8;
                }
                if (top < 16) top = 16;

                popup.style.top = top + 'px';
                popup.style.left = left + 'px';
            }

        // ================================================================
        // CUSTOM SELECT – iOS Glass Style (FIXED VERSION)
        // ================================================================
        function createCustomSelect(selectElement, options) {
            // Cegah duplikasi
            if (selectElement.parentElement && selectElement.parentElement.classList.contains('custom-select-wrap')) {
                return;
            }

            const wrap = document.createElement('div');
            wrap.className = 'custom-select-wrap';

            const trigger = document.createElement('button');
            trigger.type = 'button';
            trigger.className = 'custom-select-trigger';

            const currentVal = selectElement.value;
            const currentOpt = options.find(o => o.value === currentVal);
            const displayText = currentOpt ? currentOpt.label : (options.length > 0 ? options[0].label : 'Pilih');

            trigger.innerHTML = `
                <span class="sel-text">${displayText}</span>
                <span class="sel-arrow">⌵</span>
            `;

            // Replace select dengan wrapper
            selectElement.parentNode.insertBefore(wrap, selectElement);
            wrap.appendChild(trigger);
            wrap.appendChild(selectElement);
            selectElement.style.display = 'none';

            // Buat dropdown
            const dropdown = document.createElement('div');
            dropdown.className = 'select-dropdown';
            document.body.appendChild(dropdown);

            let isOpen = false;

            function renderOptions() {
                const currentVal = selectElement.value;
                dropdown.innerHTML = options.map(opt => `
                    <button type="button" class="sel-option ${opt.value === currentVal ? 'selected' : ''}" data-value="${opt.value}">
                        ${opt.label}
                    </button>
                `).join('');

                // Event listeners untuk options
                dropdown.querySelectorAll('.sel-option').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        e.preventDefault();
                        
                        const val = this.dataset.value;
                        const label = options.find(o => o.value === val)?.label || val;
                        
                        selectElement.value = val;
                        trigger.querySelector('.sel-text').textContent = label;
                        
                        dropdown.querySelectorAll('.sel-option').forEach(b => b.classList.remove('selected'));
                        this.classList.add('selected');
                        
                        closeDropdown();
                        
                        // Trigger change event
                        selectElement.dispatchEvent(new Event('change', { bubbles: true }));
                    });
                });
            }

            function positionDropdown() {
                const rect = trigger.getBoundingClientRect();
                const ddRect = dropdown.getBoundingClientRect();
                const vw = window.innerWidth;
                const vh = window.innerHeight;

                let top = rect.bottom + 6;
                let left = rect.left;

                // Pastikan dropdown tidak keluar layar
                if (left + ddRect.width > vw - 12) {
                    left = vw - ddRect.width - 12;
                }
                if (left < 12) {
                    left = 12;
                }
                
                // Jika dropdown terlalu ke bawah, tampilkan di atas
                if (top + ddRect.height > vh - 12) {
                    top = rect.top - ddRect.height - 6;
                }
                if (top < 12) {
                    top = 12;
                }

                dropdown.style.top = top + 'px';
                dropdown.style.left = left + 'px';
                dropdown.style.minWidth = Math.max(150, rect.width) + 'px';
            }

            function openDropdown() {
                if (isOpen) return;
                isOpen = true;
                
                // Tutup dropdown lain yang mungkin terbuka
                document.querySelectorAll('.select-dropdown.visible').forEach(d => {
                    if (d !== dropdown) {
                        d.classList.remove('visible');
                        d.style.display = 'none';
                    }
                });
                
                trigger.querySelector('.sel-arrow').classList.add('open');
                
                renderOptions();
                dropdown.classList.add('visible');
                dropdown.style.display = 'block';
                
                requestAnimationFrame(() => {
                    positionDropdown();
                });
            }

            function closeDropdown() {
                if (!isOpen) return;
                isOpen = false;
                
                trigger.querySelector('.sel-arrow').classList.remove('open');
                
                dropdown.classList.remove('visible');
                dropdown.style.display = 'none';
            }

            function toggleDropdown(e) {
                if (e) {
                    e.preventDefault();
                    e.stopPropagation();
                }
                
                if (isOpen) {
                    closeDropdown();
                } else {
                    openDropdown();
                }
            }

            // Event listeners
            trigger.addEventListener('click', toggleDropdown);
            trigger.addEventListener('mousedown', function(e) {
                e.preventDefault(); // Mencegah kehilangan focus
            });

            // Global click handler untuk menutup dropdown
            document.addEventListener('click', function(e) {
                if (isOpen && !dropdown.contains(e.target) && !trigger.contains(e.target)) {
                    closeDropdown();
                }
            }, true); // Gunakan capture phase

            // Scroll handler
            window.addEventListener('scroll', function() {
                if (isOpen) {
                    closeDropdown();
                }
            }, { passive: true });

            // Resize handler
            window.addEventListener('resize', function() {
                if (isOpen) {
                    requestAnimationFrame(positionDropdown);
                }
            }, { passive: true });

            // Update saat select berubah dari luar
            selectElement.addEventListener('change', function() {
                const val = this.value;
                const label = options.find(o => o.value === val)?.label || val;
                trigger.querySelector('.sel-text').textContent = label;
                
                if (isOpen) {
                    dropdown.querySelectorAll('.sel-option').forEach(b => {
                        b.classList.toggle('selected', b.dataset.value === val);
                    });
                }
            });

            // Cleanup saat element dihapus
            const observer = new MutationObserver(() => {
                if (!document.contains(wrap)) {
                    dropdown.remove();
                    observer.disconnect();
                }
            });
            observer.observe(document.body, { childList: true, subtree: true });

            return { 
                open: openDropdown, 
                close: closeDropdown, 
                toggle: toggleDropdown,
                element: trigger 
            };
        }

        // ================================================================
        // SCANNER
        // ================================================================
        let html5QrCode = null;
        let availableCameras = [];
        let currentCameraIndex = 0;

        function pickBestCameraIndex(cameras) {
            const ultraWideKeywords = /ultra|wide|0\.6|macro|depth|tele|telephoto/i;
            const mainKeywords = /back|rear|environment|camera2 0|facing back/i;
            let mainIdx = cameras.findIndex(c => mainKeywords.test(c.label) && !ultraWideKeywords.test(c.label));
            if (mainIdx !== -1) return mainIdx;
            let nonUltraIdx = cameras.findIndex(c => !ultraWideKeywords.test(c.label));
            if (nonUltraIdx !== -1) return nonUltraIdx;
            return 0;
        }

        async function startScanner() {
            const scannerContainer = document.getElementById('scanner-container');
            scannerContainer.classList.remove('hidden');
            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
            try {
                const cameras = await Html5Qrcode.getCameras();
                if (!cameras || cameras.length === 0) { alert("Tidak ada kamera yang terdeteksi!"); return; }
                availableCameras = cameras;
                currentCameraIndex = pickBestCameraIndex(cameras);
                const switchBtn = document.getElementById('switch-camera-btn');
                if (switchBtn) switchBtn.style.display = cameras.length > 1 ? 'inline-flex' : 'none';
                await startCameraByIndex(currentCameraIndex);
            } catch (err) {
                console.error("Gagal start kamera:", err);
                alert("Gagal mengakses kamera! Pastikan izin kamera di browser sudah di-Allow.");
            }
            scannerContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        async function startCameraByIndex(idx) {
            if (!availableCameras[idx]) return;
            const cameraId = availableCameras[idx].id;
            if (html5QrCode && html5QrCode.isScanning) {
                await html5QrCode.stop();
                html5QrCode.clear();
                html5QrCode = new Html5Qrcode("reader");
            }
            await html5QrCode.start({ deviceId: { exact: cameraId } }, { fps: 10, qrbox: { width: 250, height: 250 } },
                onScanSuccess, onScanFailure
            );
        }

        async function switchCamera() {
            if (availableCameras.length < 2) return;
            currentCameraIndex = (currentCameraIndex + 1) % availableCameras.length;
            try { await startCameraByIndex(currentCameraIndex); } catch (err) { console.error("Gagal ganti kamera:", err); }
        }

        function stopScanner() {
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().then(() => html5QrCode.clear()).catch(err => console.error("Gagal stop scanner", err));
            }
            document.getElementById('scanner-container').classList.add('hidden');
        }

        const ASSET_LOOKUP_API_URL =
            "https://script.google.com/macros/s/AKfycbz9A3SBoD1JyISyntl32t0h2b4ojYWWVtPRZcdc75et4YnomuekLDTTU_veWx4SufTlHg/exec";

        async function onScanSuccess(decodedText) {
            stopScanner();
            let fa = "",
                name = "",
                sn = "";

            try {
                let data = JSON.parse(decodedText);
                fa = data.asset_no || data.fa || "";
                name = data.asset_name || data.name || "";
                sn = data.serial_number || data.sn || "";
                injectScannedData(fa, name, sn);
                return;
            } catch (e) {}

            let url;
            try { url = new URL(decodedText); } catch (err) {
                alert("Format Barcode/QR tidak sesuai standar. Raw: " + decodedText);
                return;
            }

            let p = {};
            url.searchParams.forEach((value, key) => { p[key.toLowerCase()] = value; });
            fa = p["assetno"] || p["asset_no"] || p["fa"] || "";

            if (url.hostname.includes("cloud.finance.binus.edu") && fa) {
                const companyCode = p["companycode"] || "1000";
                if (!ASSET_LOOKUP_API_URL || !ASSET_LOOKUP_API_URL.startsWith("https://script.google.com/macros/")) {
                    alert("⚠️ Proxy belum di-setup. FA ke-isi (" + fa + "), tapi Nama/S-N isi manual.");
                    injectScannedData(fa, "", "");
                    return;
                }
                try {
                    const res = await fetch(
                        `${ASSET_LOOKUP_API_URL}?assetNo=${encodeURIComponent(fa)}&companyCode=${encodeURIComponent(companyCode)}`
                        );
                    const info = await res.json();
                    if (info.found) injectScannedData(info.assetNo || fa, info.brand || "", info.serialNumber || "");
                    else { alert("AssetNo " + fa + " gak ketemu di sistem finance.");
                        injectScannedData(fa, "", ""); }
                } catch (err) {
                    alert("Gagal konek ke server lookup asset:\n\n" + err.message);
                    injectScannedData(fa, "", "");
                }
                return;
            }

            name = p["assetname"] || p["asset_name"] || p["name"] || "";
            sn = p["serialnumber"] || p["serial_number"] || p["sn"] || "";
            if (fa || name || sn) injectScannedData(fa, name, sn);
            else alert("Data aset gagal diekstrak dari link barcode yang di-scan.");
        }

        // ================================================================
        // SIGNATURE PAD
        // ================================================================
        let sigContexts = {};
        let sigIsDrawing = { given: false, received: false };
        let sigLastX = { given: 0, received: 0 };
        let sigLastY = { given: 0, received: 0 };

        function initSignaturePads() {
            ['given', 'received'].forEach(id => {
                const wrapper = document.getElementById('sig-' + id + '-wrapper');
                if (!wrapper) return;
                const oldCanvas = wrapper.querySelector('canvas');
                if (oldCanvas) oldCanvas.remove();

                const canvas = document.createElement('canvas');
                canvas.id = 'sig-' + id;
                canvas.style.touchAction = 'none';
                wrapper.appendChild(canvas);

                const dpr = window.devicePixelRatio || 1;
                const w = wrapper.clientWidth || 400;
                const h = Math.max(100, w * 0.25);
                canvas.width = w * dpr;
                canvas.height = h * dpr;
                canvas.style.width = w + 'px';
                canvas.style.height = h + 'px';

                const ctx = canvas.getContext('2d');
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 3 * dpr;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                sigContexts[id] = ctx;

                canvas.addEventListener('mousedown', e => startDrawing(e, id, ctx));
                canvas.addEventListener('mousemove', e => draw(e, id, ctx));
                canvas.addEventListener('mouseup', () => stopDrawing(id));
                canvas.addEventListener('mouseleave', () => stopDrawing(id));
                canvas.addEventListener('touchstart', e => { e.preventDefault();
                    startDrawing(e.touches[0], id, ctx); }, { passive: false });
                canvas.addEventListener('touchmove', e => { e.preventDefault();
                    draw(e.touches[0], id, ctx); }, { passive: false });
                canvas.addEventListener('touchend', e => { e.preventDefault();
                    stopDrawing(id); });
            });
        }

        function getCanvasCoords(e, id) {
            const canvas = document.getElementById('sig-' + id);
            if (!canvas) return { x: 0, y: 0 };
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            return {
                x: ((e.clientX || e.pageX) - rect.left) * dpr,
                y: ((e.clientY || e.pageY) - rect.top) * dpr
            };
        }

        function startDrawing(e, id, ctx) {
            sigIsDrawing[id] = true;
            const c = getCanvasCoords(e, id);
            sigLastX[id] = c.x;
            sigLastY[id] = c.y;
            ctx.beginPath();
            ctx.moveTo(c.x, c.y);
            document.getElementById('sig-' + id + '-wrapper').classList.add('signed');
        }

        function draw(e, id, ctx) {
            if (!sigIsDrawing[id]) return;
            const c = getCanvasCoords(e, id);
            ctx.beginPath();
            ctx.moveTo(sigLastX[id], sigLastY[id]);
            ctx.lineTo(c.x, c.y);
            ctx.stroke();
            sigLastX[id] = c.x;
            sigLastY[id] = c.y;
        }

        function stopDrawing(id) { sigIsDrawing[id] = false; }

        function clearSignature(id) {
            const canvas = document.getElementById('sig-' + id);
            if (!canvas) return;
            const ctx = sigContexts[id];
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 3 * (window.devicePixelRatio || 1);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            const wrapper = document.getElementById('sig-' + id + '-wrapper');
            wrapper.classList.remove('signed');
        }

        function getSignatureDataURL(id) {
            const canvas = document.getElementById('sig-' + id);
            if (!canvas) return null;
            const pixels = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height).data;
            let hasDrawing = false;
            for (let i = 3; i < pixels.length; i += 4) { if (pixels[i] > 0) { hasDrawing = true; break; } }
            return hasDrawing ? canvas.toDataURL('image/png') : null;
        }

        if (!SpeechRecognitionAPI || isAppleDevice) document.body.classList.add('no-speech-support');

        let activeRecognition = null;

        document.addEventListener('focusin', (e) => {
            if (e.target.matches('[data-voice-mode]')) {

            if (activeRecognition) { activeRecognition.stop(); return; }
            if (!voiceTargetInput || !document.body.contains(voiceTargetInput)) {
                alert('Klik dulu kolom yang mau diisi, baru tap mic ini.');
                return;
            }
            const recognition = new SpeechRecognitionAPI();
            recognition.lang = 'id-ID';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
            activeRecognition = recognition;
            const btn = document.getElementById('global-mic-btn');
            btn.classList.add('mic-active');
            btn.textContent = '⏺';

            recognition.onresult = (event) => {
                let transcript = event.results[0][0].transcript.trim();
                if (voiceTargetInput.dataset.voiceMode === 'compact') transcript = transcript.replace(/\s+/g, '');
                voiceTargetInput.value = transcript.toUpperCase();
                voiceTargetInput.dispatchEvent(new Event('input', { bubbles: true }));
            };
            recognition.onerror = (event) => {
                if (event.error === 'not-allowed') alert('Akses mic ditolak. Cek permission mic browser.');
            };
            recognition.onend = () => {
                btn.classList.remove('mic-active');
                btn.textContent = '🎤';
                activeRecognition = null;
            };
            recognition.start();
        });

                        <div class="item-field-cell full">
